name: build

# Builds a portable, self-contained Canon Print Bridge bundle so a deploy machine
# can grab a patched app without a full local toolchain setup. The Windows XP VM
# (OVA) is intentionally NOT built here — it is distributed out-of-band.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained single-file, win-x64)
        shell: pwsh
        run: >
          dotnet publish CanonPrintBridge/src/CanonPrintBridge
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip bundle
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath CanonPrintBridge-win-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CanonPrintBridge-win-x64
          path: CanonPrintBridge-win-x64.zip
          retention-days: 30

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: CanonPrintBridge-win-x64.zip
