name: build

# Builds a portable, self-contained Canon Print Bridge bundle so a deploy machine
# can grab a patched app without a full local toolchain setup. The Windows XP VM
# (OVA) is intentionally NOT built here — it is distributed out-of-band.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Needed so the tag build can create a GitHub Release and attach assets.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained single-file, win-x64)
        shell: pwsh
        run: >
          dotnet publish CanonPrintBridge/src/CanonPrintBridge
          -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip bundle
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath CanonPrintBridge-win-x64.zip -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer (Setup PrintBridge <version>.exe)
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\PrintBridge.iss'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CanonPrintBridge-win-x64
          path: |
            CanonPrintBridge-win-x64.zip
            dist/*.exe
          retention-days: 30

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CanonPrintBridge-win-x64.zip
            dist/*.exe
